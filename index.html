<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Flappy Bird - Office Leaderboard</title>
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
    <style>
        body {
            background-color: #222;
            display: flex;
            justify-content: center;
            align-items: center;
            height: 100vh;
            margin: 0;
            font-family: 'Verdana', sans-serif;
            color: white;
            overflow: hidden; 
        }
        #game-container {
            position: relative;
            height: 85vh; 
            max-height: 800px;
            aspect-ratio: 288 / 512;
            box-shadow: 0px 0px 30px rgba(0,0,0,1);
        }
        canvas {
            width: 100%;
            height: 100%;
            border: 2px solid #000;
            background-color: #70c5ce;
            image-rendering: pixelated; 
        }
        
        /* Character Selection UI */
        #charSelect {
            display: none; /* Hidden until core images load */
            position: absolute;
            top: 50%; left: 50%;
            transform: translate(-50%, -50%); 
            width: 85%;
            background: rgba(0, 0, 0, 0.9);
            border: 3px solid #3498db;
            border-radius: 10px;
            padding: 20px;
            box-sizing: border-box;
            text-align: center;
            z-index: 100; 
        }
        #charSelect h2 {
            margin-top: 0;
            color: #3498db;
            font-family: 'Impact', sans-serif;
            letter-spacing: 2px;
            font-size: 24px;
            margin-bottom: 15px;
        }
        .char-btn {
            padding: 12px 24px;
            font-size: 16px;
            font-weight: bold;
            background-color: #3498db;
            border: none; border-radius: 5px;
            cursor: pointer; color: #fff;
            width: 100%; margin-bottom: 10px;
            text-transform: uppercase;
        }
        .char-btn:hover { background-color: #2980b9; }
        .random-btn { background-color: #9b59b6; border: 2px solid #8e44ad; margin-top: 10px;}
        .random-btn:hover { background-color: #8e44ad; }

        /* Leaderboard UI */
        #leaderboard {
            display: none;
            position: absolute;
            top: 50%; left: 50%;
            transform: translate(-50%, -50%); 
            width: 85%;
            background: rgba(0, 0, 0, 0.9);
            border: 3px solid #f1c40f;
            border-radius: 10px;
            padding: 20px;
            box-sizing: border-box;
            text-align: center;
            z-index: 100; 
        }
        #leaderboard h2 {
            margin-top: 0; color: #f1c40f;
            font-family: 'Impact', sans-serif;
            letter-spacing: 2px; font-size: 24px; margin-bottom: 5px;
        }
        #prizeText {
            color: #2ecc71; font-weight: bold; font-size: 14px;
            margin-top: 0; margin-bottom: 15px; text-transform: uppercase;
            text-shadow: 1px 1px 2px #000;
        }
        #leaderboard ol {
            text-align: left; padding-left: 20px;
            font-size: 18px; line-height: 1.6; margin-bottom: 20px;
        }
        #restartBtn {
            padding: 12px 24px; font-size: 18px; font-weight: bold;
            background-color: #f1c40f; border: none; border-radius: 5px;
            cursor: pointer; color: #000; width: 100%;
        }
        #restartBtn:hover { background-color: #d4ac0d; }
    </style>
</head>
<body>

    <div id="game-container">
        <canvas id="gameCanvas" width="288" height="512"></canvas>
        
        <div id="charSelect">
            <h2>SELECT PLAYER</h2>
            <div id="charList">
                </div>
        </div>

        <div id="leaderboard">
            <h2>TOP 5 SCORES</h2>
            <p id="prizeText">🏆 Top 1 Wins a Powerbank! 🏆</p>
            <ol id="scoreList">
                <li>Loading scores...</li>
            </ol>
            <button id="restartBtn" onclick="location.reload()">PLAY AGAIN</button>
        </div>
    </div>

    <script>
        // ==========================================
        // 1. SUPABASE DATABASE SETUP
        // ==========================================
        const { createClient } = supabase;
        
        const supabaseUrl = 'https://unmwltgfyaonwxiauhlm.supabase.co'; 
        const supabaseKey = 'eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6InVubXdsdGdmeWFvbnd4aWF1aGxtIiwicm9sZSI6InNlcnZpY2Vfcm9sZSIsImlhdCI6MTc3ODE0OTkwMCwiZXhwIjoyMDkzNzI1OTAwfQ.L05U7AW3SuKroB1HmNyVT_9xvPmtOzIpcmAxK8_TW50';

        let db = null;
        if (supabaseUrl.startsWith('http')) {
            db = createClient(supabaseUrl, supabaseKey);
        }

        // ==========================================
        // 2. CHARACTER CONFIGURATION (EASY TO ADD MORE)
        // ==========================================
        // To add a new person, just copy a line, change the name, and point to their files in the 'faces' folder!
        const FACES = [
            { name: "Paine", closed: "images/faces/paine-closed.png", opened: "images/faces/paine-opened.png" },
            { name: "Gil", closed: "images/faces/gil-closed.png", opened: "images/faces/gil-opened.png" }
            // Example: { name: "John", closed: "images/faces/john-closed.png", opened: "images/faces/john-opened.png" }
        ];

        // ==========================================
        // 3. GAME VARIABLES
        // ==========================================
        const cvs = document.getElementById("gameCanvas");
        const ctx = cvs.getContext("2d");

        const pipeWidth = 52;
        const pipeHeight = 320;
        const birdW = 46; 
        const birdH = 50; 
        const fgHeight = 112;

        let bX = 50; 
        let bY = 220; 
        let velocity = 0;
        let gravity = 0.2; 
        let jump = -4.5;   
        let pipeSpeed = 1.5;
        let terminalVelocity = 6; 

        let gap = 140; 
        let constant = pipeHeight + gap;
        let score = 0;
        
        let frames = 0;
        let gameState = 0; 
        let isGameOver = false;

        let pipe = [];
        let birdFrames = [new Image(), new Image()]; // Populated after selection

        // ==========================================
        // 4. TWO-STAGE PRE-LOADER (Core -> Face)
        // ==========================================
        
        // Bulletproof Image Loader
        function loadImg(src, callback) {
            const img = new Image();
            img.onload = callback;
            img.onerror = function() {
                alert("🚨 MISSING FILE: " + src + "\n\nEnsure you pushed this file to your GitHub repository!");
                img.onload = null; img.onerror = null;
                img.src = "data:image/png;base64,iVBORw0KGgoAAAANSUhEUgAAAAEAAAABCAQAAAC1HAwCAAAAC0lEQVR42mNkYAAAAAYAAjCB0C8AAAAASUVORK5CYII=";
                callback();
            };
            img.src = src;
            return img;
        }

        // STAGE 1: Load Core UI & Backgrounds
        let coreLoaded = 0;
        const TOTAL_CORE = 15; 
        
        function checkCore() {
            coreLoaded++;
            if (coreLoaded === TOTAL_CORE) {
                // Draw a nice background behind the menu so it isn't a blank blue screen
                ctx.drawImage(bg, 0, 0, cvs.width, cvs.height);
                ctx.drawImage(fg, 0, cvs.height - fgHeight, cvs.width, fgHeight);
                buildCharacterMenu();
            }
        }

        const bgTypes = ['background-day', 'background-night'];
        const pipeTypes = ['pipe-green', 'pipe-red'];
        const activeBg = bgTypes[Math.floor(Math.random() * bgTypes.length)];
        const activePipe = pipeTypes[Math.floor(Math.random() * pipeTypes.length)];

        const bg = loadImg(`images/${activeBg}.png`, checkCore);
        const fg = loadImg("images/base.png", checkCore);
        const pipeImg = loadImg(`images/${activePipe}.png`, checkCore);
        const getReadyImg = loadImg("images/message.png", checkCore);
        const gameOverImg = loadImg("images/gameover.png", checkCore);

        const numbers = [];
        for (let i = 0; i <= 9; i++) {
            numbers[i] = loadImg(`images/${i}.png`, checkCore);
        }

        const wingSound = new Audio("audio/wing.wav");
        const hitSound = new Audio("audio/hit.wav");
        const dieSound = new Audio("audio/die.wav");
        const pointSound = new Audio("audio/point.wav");
        const swooshSound = new Audio("audio/swoosh.wav");

        // STAGE 2: Character Selection Menu
        function buildCharacterMenu() {
            const charMenu = document.getElementById('charSelect');
            const charList = document.getElementById('charList');
            charMenu.style.display = 'block';

            // Generate specific face buttons
            FACES.forEach(face => {
                let btn = document.createElement('button');
                btn.className = 'char-btn';
                btn.innerText = `Play as ${face.name}`;
                btn.onclick = () => selectFace(face);
                charList.appendChild(btn);
            });

            // Generate Random button
            let randBtn = document.createElement('button');
            randBtn.className = 'char-btn random-btn';
            randBtn.innerText = '🎲 Random Player';
            randBtn.onclick = () => {
                const randomFace = FACES[Math.floor(Math.random() * FACES.length)];
                selectFace(randomFace);
            };
            charList.appendChild(randBtn);
        }

        function selectFace(faceObj) {
            document.getElementById('charSelect').style.display = 'none';
            
            let faceLoaded = 0;
            function checkFace() {
                faceLoaded++;
                if (faceLoaded === 2) {
                    // Start the engine!
                    pipe[0] = { x: cvs.width + 50, y: getRandomPipeY(), passed: false };
                    requestAnimationFrame(draw); 
                }
            }
            
            // Load the specific face chosen by the user
            birdFrames[0] = loadImg(faceObj.closed, checkFace);
            birdFrames[1] = loadImg(faceObj.opened, checkFace);
        }

        // ==========================================
        // 5. GENERATE PIPES MATH
        // ==========================================
        function getRandomPipeY() {
            let minPipeY = -pipeHeight + 50; 
            let maxPipeY = cvs.height - fgHeight - gap - 50 - pipeHeight;
            return Math.floor(Math.random() * (maxPipeY - minPipeY + 1)) + minPipeY;
        }

        // ==========================================
        // 6. CONTROLS
        // ==========================================
        function action() {
            if (gameState === 0) {
                gameState = 1;
                swooshSound.play();
                velocity = jump; 
            } else if (gameState === 1 && !isGameOver) {
                velocity = jump; 
                wingSound.currentTime = 0; 
                wingSound.play();
            }
        }

        document.addEventListener("keydown", function(e) {
            if (e.code === "Space" || e.code === "ArrowUp") action();
        });
        document.addEventListener("mousedown", function(e) {
            // Prevent accidental jumps while clicking menu buttons
            if (document.getElementById('charSelect').style.display === 'none') {
                action();
            }
        });
        document.addEventListener("touchstart", function(e) {
            if (document.getElementById('charSelect').style.display === 'none') {
                action();
            }
        });

        // ==========================================
        // 7. LEADERBOARD SYSTEM
        // ==========================================
        async function submitScore(playerName, finalScore) {
            if (!db) return; 
            const { error } = await db.from('leaderboard').insert([{ name: playerName, score: finalScore }]);
            if (error) console.error("Database Error:", error);
        }

        async function showLeaderboard() {
            const leaderboardDiv = document.getElementById('leaderboard');
            leaderboardDiv.style.display = 'block';
            
            if (!db) {
                document.getElementById('scoreList').innerHTML = '<li>Database not connected.</li>';
                return;
            }

            const list = document.getElementById('scoreList');
            list.innerHTML = '<li>Loading scores...</li>';

            const { data, error } = await db
                .from('leaderboard')
                .select('name, score')
                .order('score', { ascending: false })
                .limit(5);

            if (error) {
                console.error("Supabase Error:", error);
                list.innerHTML = '<li>Failed to load scores.</li>';
                return;
            }

            if (!data || data.length === 0) {
                list.innerHTML = '<li>No scores yet. Be the first!</li>';
                return;
            }

            list.innerHTML = '';
            data.forEach(entry => {
                let li = document.createElement('li');
                li.textContent = `${entry.name} - ${entry.score}`;
                list.appendChild(li);
            });
        }

        function drawScore() {
            let scoreStr = score.toString();
            let totalWidth = scoreStr.length * 24; 
            let startX = (cvs.width - totalWidth) / 2;

            for (let i = 0; i < scoreStr.length; i++) {
                let num = parseInt(scoreStr[i]);
                if (numbers[num].complete) {
                    ctx.drawImage(numbers[num], startX + (i * 24), 30);
                }
            }
        }

        // ==========================================
        // 8. MAIN GAME LOOP (Locked to 60 FPS)
        // ==========================================
        let then = Date.now();
        const fpsInterval = 1000 / 60; 

        function draw() {
            requestAnimationFrame(draw);
            
            let now = Date.now();
            let elapsed = now - then;
            
            if (elapsed > fpsInterval) {
                then = now - (elapsed % fpsInterval);
                
                ctx.drawImage(bg, 0, 0);

                if (gameState === 1) {
                    for(let i = 0; i < pipe.length; i++) {
                        
                        ctx.save();
                        ctx.translate(pipe[i].x + pipeWidth/2, pipe[i].y + pipeHeight/2);
                        ctx.scale(1, -1);
                        ctx.drawImage(pipeImg, -pipeWidth/2, -pipeHeight/2, pipeWidth, pipeHeight);
                        ctx.restore();

                        ctx.drawImage(pipeImg, pipe[i].x, pipe[i].y + constant, pipeWidth, pipeHeight);
                        
                        pipe[i].x -= pipeSpeed;

                        if( bX + birdW > pipe[i].x && bX < pipe[i].x + pipeWidth && 
                          (bY < pipe[i].y + pipeHeight || bY + birdH > pipe[i].y + constant) || 
                          bY + birdH >= cvs.height - fgHeight ) {
                            
                            if (!isGameOver) {
                                isGameOver = true;
                                gameState = 2;
                                hitSound.play();
                                
                                if (bY + birdH < cvs.height - fgHeight) {
                                    setTimeout(() => dieSound.play(), 400);
                                }

                                setTimeout(async () => {
                                    let playerName = prompt(`Game Over! You scored ${score}.\nEnter your name for the leaderboard:`);
                                    if (playerName && playerName.trim() !== "") {
                                        await submitScore(playerName.trim(), score);
                                    }
                                    await showLeaderboard();
                                }, 800); 
                            }
                        }

                        if(!pipe[i].passed && pipe[i].x + pipeWidth < bX) {
                            score++;
                            pointSound.play();
                            pipe[i].passed = true;
                        }
                    }

                    let lastPipe = pipe[pipe.length - 1];
                    if (lastPipe.x < cvs.width - 170) {
                        pipe.push({ x: cvs.width, y: getRandomPipeY(), passed: false });
                    }
                }

                ctx.drawImage(fg, 0, cvs.height - fgHeight);

                // --- CUSTOM ANIMATION LOGIC ---
                let birdState = 0;
                let drawY = bY;
                
                if (gameState === 0) {
                    drawY = bY + Math.sin(frames * 0.1) * 5; 
                    birdState = 0; 
                } else if (gameState !== 2) {
                    if (velocity < 0) {
                        birdState = 1; 
                    } else {
                        birdState = 0; 
                    }
                }
                
                ctx.save();
                ctx.translate(bX + birdW/2, drawY + birdH/2);
                if (gameState === 1 || gameState === 2) {
                    let rotation = Math.min(Math.PI / 4, Math.max(-Math.PI / 4, (velocity * 0.08)));
                    if (isGameOver) rotation = Math.PI / 2; 
                    ctx.rotate(rotation);
                }
                
                ctx.drawImage(birdFrames[birdState], -birdW/2, -birdH/2, birdW, birdH); 
                ctx.restore();
                
                if (gameState === 1 && !isGameOver) {
                    velocity += gravity;
                    if (velocity > terminalVelocity) velocity = terminalVelocity;
                    bY += velocity;
                } else if (isGameOver && bY + birdH < cvs.height - fgHeight) {
                    velocity += gravity;
                    if (velocity > terminalVelocity) velocity = terminalVelocity;
                    bY += velocity;
                }

                if (gameState === 0) {
                    ctx.drawImage(getReadyImg, cvs.width/2 - 184/2, 100); 
                } else if (gameState === 2 && bY + birdH >= cvs.height - fgHeight) {
                    ctx.drawImage(gameOverImg, cvs.width/2 - 192/2, cvs.height/2 - 100);
                }

                if (gameState === 1 || gameState === 2) drawScore();

                frames++;
            }
        }
    </script>
</body>
</html>
